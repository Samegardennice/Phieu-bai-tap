<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
</head>
<body>
    <form action="">
    <label for="text">Trường hợp 1</label>
    <input type="text" id="text" name="text" required>
    <button type="submit">Gửi</button>
    <label for="email">Trường hợp 2</label>
    <input type="email" id="email" name="email" value="abc">
    <label for="number">Trường hợp 3</label>
    <input type="number" id="number" name="number" min="1" max="10" value="15">
    <label for="text">Trường hợp 4</label>
    <input type="text" id="text" name="text" pattern="[0-9]{10}" value="abc123">
    <label for="password">Trường hợp 5</label>
    <input type="password" id="password" name="password" minlength="8" value="123">
    </form>
</body>
</html>
