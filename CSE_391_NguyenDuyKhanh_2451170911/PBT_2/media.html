<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media</title>
</head>
<body>
    <header>
        <section id="Product-info">
            <h1>Giới thiệu sản phẩm</h1>
            <figure>
                <img src="https://down-vn.img.susercontent.com/file/vn-11134207-7qukw-liy168tk6t58bb.webp" alt="Ốp lưng iPhone TPU silicon bảo vệ điện thoại"
                width="200px">
                <figcaption>Ốp lưng iPhone TPU silicon bảo vệ điện thoại</figcaption>
            </figure>
            <figure>
                <img src="https://down-vn.img.susercontent.com/file/vn-11134207-7qukw-lk7s04fnm1840a.webp" 
                alt="Giá đỡ ghế xanh" width="200px">
                <figcaption>Giá đỡ ghế xanh U3-2</figcaption>
            </figure>
            <figure>
                <img src="https://down-vn.img.susercontent.com/file/fadb251eea5b1b9f34f70e9a4155ad2c.webp" 
                alt="Trái cây sấy khô" width="200px">
                <figcaption>Trái cây sấy vụn túi 200g</figcaption>
            </figure>
        </section>
        <section id="Media">
            <h1>Video nhúng youtube</h1>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/MeRwvus2rH8?si=2jeaJEfc1q1KF0to" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            <video src="#" controls poster="https://via.placeholder.com/300">
                <source src="video.mp4" type="video/mp4">
                <source> src="video.webm" type="video/webm">
                Hiện tại khoogn xem được video này
            </video>

            <h2>Nhạc nền giới thiệu</h2>
            <audio controls>
                <source> src="audio.mp3" type="audio/mpeg">
            </audio>
        </section>
        <section id="SVG">
            <h2>Hình SVG</h2>
            <svg width="100" height="100">
                <circle cx="50" cy="50" r="40" stroke="green" stroke-width="4" fill="yellow" />
        </section>
    </header>
</body>
</html>
